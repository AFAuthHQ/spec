# AFAuth e2e harness — dependency-side stack.
#
# Brings up trust, registry, and a reference @afauthhq/server, each
# with its own postgres + redis. The reference server is built from
# this directory; trust and registry are built from sibling source
# trees pointed to by E2E_TRUST_DIR / E2E_REGISTRY_DIR (default:
# ../../../trust and ../../../registry, the workspace layout).
#
# Host ports:
#   trust            → 4001
#   registry         → 4002
#   reference-server → 4003
#
# Internal-only (no host exposure):
#   trust postgres, trust redis, registry postgres, registry redis.

services:
  trust-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: trust
      POSTGRES_PASSWORD: trust
      POSTGRES_DB: trust
    volumes:
      - trust_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trust"]
      interval: 3s
      timeout: 3s
      retries: 20

  trust-redis:
    image: redis:7-alpine
    volumes:
      - trust_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

  trust:
    build:
      context: ${E2E_TRUST_DIR:-../../../trust}
    depends_on:
      trust-postgres:
        condition: service_healthy
      trust-redis:
        condition: service_healthy
    environment:
      # Must NOT be production: trust refuses to boot when
      # TRUST_E2E_AUTOCONFIRM (set below) is enabled under
      # NODE_ENV=production. See trust/src/lib/config.ts.
      NODE_ENV: development
      PORT: "3000"
      LOG_LEVEL: info
      DATABASE_URL: postgres://trust:trust@trust-postgres:5432/trust
      REDIS_URL: redis://trust-redis:6379
      PUBLIC_BASE_URL: http://localhost:4001
      JWKS_PUBLIC_URL: http://localhost:4001/.well-known/jwks.json
      # e2e-only secrets — these are public-by-construction and MUST
      # NOT be reused in any real deployment.
      TRUST_SESSION_SECRET: e2e-session-secret-do-not-use-in-production-xxxxx
      TRUST_ADMIN_SECRET: e2e-admin-secret-1234567890
      TRUST_KEK_BASE64: q6urq6urq6urq6urq6urq6urq6urq6urq6urq6urq6s=
      TRUST_PSEUDONYM_KEY_BASE64: zc3Nzc3Nzc3Nzc3Nzc3Nzc3Nzc3Nzc3Nzc3Nzc3Nzc0=
      # Test-mode gate: enables POST /v1/link/confirm-e2e, which lets
      # the harness auto-confirm a pending link request without a
      # browser. See trust/src/lib/config.ts for the warning. MUST NOT
      # be set in any real deployment.
      TRUST_E2E_AUTOCONFIRM: "1"
      EMAIL_PROVIDER: stdout
      EMAIL_FROM: no-reply@e2e.afauth.local
    ports:
      - "4001:3000"

  registry-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: registry
      POSTGRES_PASSWORD: registry
      POSTGRES_DB: registry
    volumes:
      - registry_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U registry"]
      interval: 3s
      timeout: 3s
      retries: 20

  registry-redis:
    image: redis:7-alpine
    volumes:
      - registry_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

  registry:
    build:
      context: ${E2E_REGISTRY_DIR:-../../../registry}
    depends_on:
      registry-postgres:
        condition: service_healthy
      registry-redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "3000"
      LOG_LEVEL: info
      DATABASE_URL: postgres://registry:registry@registry-postgres:5432/registry
      REDIS_URL: redis://registry-redis:6379
      PUBLIC_BASE_URL: http://localhost:4002
      REGISTRY_ADMIN_SECRET: e2e-registry-admin-secret-1234567890
      REGISTRY_CRON_SECRET: e2e-registry-cron-secret-1234567890
      # Test-mode gate: enables POST /admin/e2e/listings, which lets
      # the harness seed a listing without the challenge/proof
      # ceremony and without the HTTPS/public-host constraint. See
      # registry/src/lib/config.ts. MUST NOT be set in production.
      REGISTRY_E2E_DIRECT_INSERT: "1"
    ports:
      - "4002:3000"

  reference-server:
    build:
      context: ./reference-server
    environment:
      PORT: "3000"
      PUBLIC_BASE_URL: http://localhost:4003
      SERVICE_DID: did:web:localhost%3A4003
      # Wire the e2e attestor: accept `afauth-trust` JWTs verified
      # against the trust container's JWKS. The SDK's stock
      # JwksAttestor refuses http URLs; the reference-server uses a
      # LooseJwksAttestor shim for this fixture only.
      ATTESTOR_TRUST_JWKS_URL: http://trust:3000/.well-known/jwks.json
      # E2E_CLAIM swaps the email RecipientHandler for a capturing
      # one and enables /e2e/last-invitation + /e2e/claim — used by
      # scenario 9 to drive owner-invitation → claim without a
      # browser. MUST NOT be set in production.
      E2E_CLAIM: "1"
    depends_on:
      - trust
    ports:
      - "4003:3000"

  # Second reference server for the cross-service portability scenario
  # (§D.1). Different SERVICE_DID + PUBLIC_BASE_URL; otherwise identical.
  reference-server-b:
    build:
      context: ./reference-server
    environment:
      PORT: "3000"
      PUBLIC_BASE_URL: http://localhost:4004
      SERVICE_DID: did:web:localhost%3A4004
    ports:
      - "4004:3000"

volumes:
  trust_pg:
  trust_redis:
  registry_pg:
  registry_redis:
